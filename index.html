<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet the Duck</title>
  <style>
    :root {
      --bg1: #fff7d6;
      --bg2: #c8f3ff;
      --duck: #ffd84d;
      --duck-dark: #f4bd22;
      --orange: #ff9f1c;
      --text: #2b2b2b;
      --muted: #6f6f6f;
      --card: rgba(255,255,255,.72);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 30% 20%, #ffffff 0 8%, transparent 9%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      width: min(440px, 94vw);
      text-align: center;
      padding: 18px;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.4rem);
      margin: 0 0 4px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 18px;
    }

    .pond {
      position: relative;
      height: min(55vh, 430px);
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .duck-wrap {
      position: relative;
      width: 280px;
      height: 250px;
      cursor: pointer;
      touch-action: none;
      animation: float 2.8s ease-in-out infinite;
    }

    .duck-wrap.pet {
      animation: happy 280ms ease-out;
    }

    .duck-body {
      position: absolute;
      left: 36px;
      top: 98px;
      width: 205px;
      height: 122px;
      background: var(--duck);
      border: 5px solid #2b2b2b;
      border-radius: 52% 48% 45% 55%;
      box-shadow: inset -15px -18px 0 rgba(0,0,0,.06);
    }

    .wing {
      position: absolute;
      left: 86px;
      top: 132px;
      width: 82px;
      height: 52px;
      background: var(--duck-dark);
      border: 4px solid #2b2b2b;
      border-radius: 55% 45% 60% 40%;
      transform: rotate(-12deg);
    }

    .duck-head {
      position: absolute;
      left: 142px;
      top: 45px;
      width: 95px;
      height: 88px;
      background: var(--duck);
      border: 5px solid #2b2b2b;
      border-radius: 50%;
      box-shadow: inset -8px -10px 0 rgba(0,0,0,.05);
      transform-origin: center bottom;
    }

    .duck-wrap.pet .duck-head {
      transform: rotate(-5deg) translateY(6px);
    }

    .eye {
      position: absolute;
      right: 27px;
      top: 27px;
      width: 12px;
      height: 12px;
      background: #1f1f1f;
      border-radius: 50%;
    }

    .blush {
      position: absolute;
      right: 15px;
      top: 45px;
      width: 18px;
      height: 8px;
      background: rgba(255, 110, 140, .35);
      border-radius: 999px;
    }

    .beak {
      position: absolute;
      right: -38px;
      top: 38px;
      width: 48px;
      height: 26px;
      background: var(--orange);
      border: 4px solid #2b2b2b;
      border-left: 0;
      border-radius: 0 60% 60% 0;
      transform-origin: left center;
    }

    .duck-wrap.pet .beak {
      transform: scaleX(1.15);
    }

    .feet {
      position: absolute;
      left: 96px;
      top: 213px;
      width: 98px;
      height: 22px;
    }

    .foot {
      position: absolute;
      width: 42px;
      height: 17px;
      background: var(--orange);
      border: 4px solid #2b2b2b;
      border-radius: 60% 60% 40% 40%;
    }

    .foot:nth-child(2) {
      right: 0;
    }

    .quack {
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%) scale(.8);
      opacity: 0;
      background: white;
      border: 4px solid #2b2b2b;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 900;
      font-size: 1.35rem;
      pointer-events: none;
    }

    .quack.show {
      animation: pop 720ms ease-out forwards;
    }

    .heart {
      position: absolute;
      font-size: 22px;
      pointer-events: none;
      animation: heart 950ms ease-out forwards;
    }

    .stats {
      margin: 8px auto 14px;
      padding: 14px 16px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 16px 45px rgba(0,0,0,.08);
    }

    .counter {
      font-size: 1.35rem;
      font-weight: 900;
    }

    .tiny {
      margin-top: 3px;
      color: var(--muted);
      font-size: .9rem;
    }

    .ad {
      height: 68px;
      border-radius: 18px;
      background: rgba(255,255,255,.55);
      border: 2px dashed rgba(43,43,43,.22);
      color: rgba(43,43,43,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    @keyframes happy {
      0% { transform: scale(1) rotate(0); }
      35% { transform: scale(1.08, .94) rotate(-2deg); }
      70% { transform: scale(.98, 1.04) rotate(2deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes pop {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(.6); }
      18% { opacity: 1; transform: translateX(-50%) translateY(-5px) scale(1.1); }
      75% { opacity: 1; transform: translateX(-50%) translateY(-22px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-38px) scale(.92); }
    }

    @keyframes heart {
      0% { opacity: 1; transform: translateY(0) scale(.7); }
      100% { opacity: 0; transform: translateY(-72px) scale(1.4); }
    }

    @media (max-height: 670px) {
      .pond { height: 330px; }
      .duck-wrap { transform: scale(.9); }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Pet the Duck</h1>
    <div class="subtitle">pet duck. duck quack.</div>

    <section class="pond">
      <div class="quack" id="quack">QUACK!</div>

      <div class="duck-wrap" id="duck" aria-label="Pet the duck" role="button">
        <div class="duck-body"></div>
        <div class="wing"></div>
        <div class="duck-head">
          <div class="eye"></div>
          <div class="blush"></div>
          <div class="beak"></div>
        </div>
        <div class="feet">
          <div class="foot"></div>
          <div class="foot"></div>
        </div>
      </div>
    </section>

    <section class="stats">
      <div class="counter"><span id="count">0</span> duck pets</div>
      <div class="tiny" id="mood">duck is waiting</div>
    </section>

    <div class="ad">calm ad space</div>
  </main>

  <script>
    const duck = document.getElementById("duck");
    const quack = document.getElementById("quack");
    const countEl = document.getElementById("count");
    const mood = document.getElementById("mood");

    let count = Number(localStorage.getItem("duckPets") || 0);
    countEl.textContent = count.toLocaleString();

    const moods = [
      "duck approves",
      "duck is delighted",
      "duck feels loved",
      "duck says thank you",
      "duck is emotionally supported",
      "duck believes in you"
    ];

    function beepQuack() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "square";
        osc.frequency.setValueAtTime(260, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(185, ctx.currentTime + 0.13);

        gain.gain.setValueAtTime(0.04, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.16);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.17);
      } catch (e) {}
    }

    function spawnHeart(x, y) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = Math.random() > 0.5 ? "♡" : "✨";
      heart.style.left = x + "px";
      heart.style.top = y + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 1000);
    }

    function petDuck(event) {
      count++;
      localStorage.setItem("duckPets", count);
      countEl.textContent = count.toLocaleString();

      duck.classList.remove("pet");
      void duck.offsetWidth;
      duck.classList.add("pet");

      quack.classList.remove("show");
      void quack.offsetWidth;
      quack.classList.add("show");

      mood.textContent = moods[Math.floor(Math.random() * moods.length)];

      const point = event.touches ? event.touches[0] : event;
      spawnHeart(point.clientX - 8, point.clientY - 12);

      if (navigator.vibrate) navigator.vibrate(18);
      beepQuack();
    }

    duck.addEventListener("pointerdown", petDuck);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "Enter") {
        const rect = duck.getBoundingClientRect();
        petDuck({ clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 });
      }
    });
  </script>
</body>
</html>
