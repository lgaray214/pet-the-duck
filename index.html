<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet the Duck</title>
  <style>
    :root {
      --bg1: #fff7d6;
      --bg2: #c8f3ff;
      --duck: #ffffff;
      --duck-shadow: #e9e9e9;
      --duck-soft: #f7f7f7;
      --orange: #f28b18;
      --orange-dark: #cc6d10;
      --text: #2b2b2b;
      --muted: #6f6f6f;
      --card: rgba(255,255,255,.72);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 30% 20%, #ffffff 0 8%, transparent 9%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      width: min(440px, 94vw);
      text-align: center;
      padding: 18px;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.4rem);
      margin: 0 0 4px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 18px;
    }

    .pond {
      position: relative;
      height: min(55vh, 430px);
      min-height: 330px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .duck-wrap {
      position: relative;
      width: 310px;
      height: 275px;
      cursor: pointer;
      touch-action: none;
      animation: float 2.8s ease-in-out infinite;
    }

    .duck-wrap.pet {
      animation: happy 280ms ease-out;
    }

    .duck-body {
      position: absolute;
      left: 28px;
      top: 105px;
      width: 235px;
      height: 145px;
      background: radial-gradient(circle at 40% 28%, #ffffff 0 45%, var(--duck-soft) 70%, var(--duck-shadow) 100%);
      border: 5px solid #2b2b2b;
      border-radius: 58% 48% 50% 55%;
      box-shadow: inset -18px -20px 0 rgba(0,0,0,.04);
    }

    .duck-body::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 26px;
      width: 110px;
      height: 70px;
      background: rgba(255,255,255,.75);
      border-radius: 50%;
      transform: rotate(-15deg);
    }

    .wing {
      position: absolute;
      left: 78px;
      top: 145px;
      width: 100px;
      height: 62px;
      background: linear-gradient(145deg, #ffffff, #e8e8e8);
      border: 4px solid #2b2b2b;
      border-radius: 60% 40% 60% 45%;
      transform: rotate(-8deg);
      opacity: .95;
    }

    .duck-head {
      position: absolute;
      left: 150px;
      top: 54px;
      width: 100px;
      height: 92px;
      background: radial-gradient(circle at 35% 25%, #ffffff 0 45%, #f4f4f4 75%, #e8e8e8 100%);
      border: 5px solid #2b2b2b;
      border-radius: 54% 50% 48% 52%;
      box-shadow: inset -8px -10px 0 rgba(0,0,0,.04);
      transform-origin: center bottom;
      z-index: 3;
    }

    .duck-neck {
      position: absolute;
      left: 160px;
      top: 118px;
      width: 78px;
      height: 58px;
      background: var(--duck);
      border-left: 5px solid #2b2b2b;
      border-right: 5px solid #2b2b2b;
      border-radius: 45%;
      z-index: 2;
    }

    .duck-wrap.pet .duck-head {
      transform: rotate(-6deg) translateY(6px);
    }

    .eye {
      position: absolute;
      right: 28px;
      top: 32px;
      width: 9px;
      height: 9px;
      background: #111;
      border-radius: 50%;
      box-shadow: 1px 1px 0 rgba(255,255,255,.8);
    }

    .blush {
      position: absolute;
      right: 13px;
      top: 49px;
      width: 16px;
      height: 7px;
      background: rgba(255, 120, 140, .25);
      border-radius: 999px;
    }

    .beak {
      position: absolute;
      right: -52px;
      top: 42px;
      width: 62px;
      height: 25px;
      background: linear-gradient(#ffa332, var(--orange));
      border: 4px solid #2b2b2b;
      border-left: 0;
      border-radius: 20% 65% 65% 20%;
      transform-origin: left center;
    }

    .beak::after {
      content: "";
      position: absolute;
      left: 8px;
      bottom: 4px;
      width: 42px;
      height: 3px;
      background: var(--orange-dark);
      border-radius: 99px;
    }

    .duck-wrap.pet .beak {
      transform: scaleX(1.12);
    }

    .feet {
      position: absolute;
      left: 105px;
      top: 239px;
      width: 108px;
      height: 28px;
      z-index: -1;
    }

    .foot {
      position: absolute;
      width: 46px;
      height: 18px;
      background: var(--orange);
      border: 4px solid #2b2b2b;
      border-radius: 70% 70% 40% 40%;
      transform: rotate(2deg);
    }

    .foot:nth-child(2) {
      right: 0;
      transform: rotate(-2deg);
    }

    .quack {
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%) scale(.8);
      opacity: 0;
      background: white;
      border: 4px solid #2b2b2b;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 900;
      font-size: 1.35rem;
      pointer-events: none;
      z-index: 10;
    }

    .quack.show {
      animation: pop 720ms ease-out forwards;
    }

    .heart {
      position: absolute;
      font-size: 22px;
      pointer-events: none;
      animation: heart 950ms ease-out forwards;
    }

    .stats {
      margin: 8px auto 14px;
      padding: 14px 16px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 16px 45px rgba(0,0,0,.08);
    }

    .counter {
      font-size: 1.35rem;
      font-weight: 900;
    }

    .tiny {
      margin-top: 3px;
      color: var(--muted);
      font-size: .9rem;
    }

    .ad {
      height: 68px;
      border-radius: 18px;
      background: rgba(255,255,255,.55);
      border: 2px dashed rgba(43,43,43,.22);
      color: rgba(43,43,43,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    @keyframes happy {
      0% { transform: scale(1) rotate(0); }
      35% { transform: scale(1.06, .95) rotate(-2deg); }
      70% { transform: scale(.98, 1.03) rotate(2deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes pop {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(.6); }
      18% { opacity: 1; transform: translateX(-50%) translateY(-5px) scale(1.1); }
      75% { opacity: 1; transform: translateX(-50%) translateY(-22px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-38px) scale(.92); }
    }

    @keyframes heart {
      0% { opacity: 1; transform: translateY(0) scale(.7); }
      100% { opacity: 0; transform: translateY(-72px) scale(1.4); }
    }

    @media (max-height: 670px) {
      .pond { height: 330px; }
      .duck-wrap { transform: scale(.9); }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Pet the Duck</h1>
    <div class="subtitle">pet duck. duck quack.</div>

    <section class="pond">
      <div class="quack" id="quack">QUACK!</div>

      <div class="duck-wrap" id="duck" aria-label="Pet the duck" role="button">
        <div class="duck-body"></div>
        <div class="wing"></div>
        <div class="duck-neck"></div>
        <div class="duck-head">
          <div class="eye"></div>
          <div class="blush"></div>
          <div class="beak"></div>
        </div>
        <div class="feet">
          <div class="foot"></div>
          <div class="foot"></div>
        </div>
      </div>
    </section>

    <section class="stats">
      <div class="counter"><span id="count">0</span> duck pets</div>
      <div class="tiny" id="mood">duck is waiting</div>
    </section>

    <div class="ad">calm ad space</div>
  </main>

  <script>
    const duck = document.getElementById("duck");
    const quack = document.getElementById("quack");
    const countEl = document.getElementById("count");
    const mood = document.getElementById("mood");

    let count = Number(localStorage.getItem("duckPets") || 0);
    countEl.textContent = count.toLocaleString();

    const moods = [
      "duck approves",
      "duck is delighted",
      "duck feels loved",
      "duck says thank you",
      "duck is emotionally supported",
      "duck believes in you"
    ];

    function beepQuack() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();

        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();

        osc1.type = "square";
        osc2.type = "sawtooth";

        osc1.frequency.setValueAtTime(420, ctx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.18);

        osc2.frequency.setValueAtTime(260, ctx.currentTime);
        osc2.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.18);

        gain.gain.setValueAtTime(0.16, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);

        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ctx.destination);

        osc1.start();
        osc2.start();

        osc1.stop(ctx.currentTime + 0.22);
        osc2.stop(ctx.currentTime + 0.22);
      } catch (e) {}
    }

    function spawnHeart(x, y) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = Math.random() > 0.5 ? "♡" : "✨";
      heart.style.left = x + "px";
      heart.style.top = y + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 1000);
    }

    function petDuck(event) {
      count++;
      localStorage.setItem("duckPets", count);
      countEl.textContent = count.toLocaleString();

      duck.classList.remove("pet");
      void duck.offsetWidth;
      duck.classList.add("pet");

      quack.classList.remove("show");
      void quack.offsetWidth;
      quack.classList.add("show");

      mood.textContent = moods[Math.floor(Math.random() * moods.length)];

      const point = event.touches ? event.touches[0] : event;
      spawnHeart(point.clientX - 8, point.clientY - 12);

      if (navigator.vibrate) navigator.vibrate(18);
      beepQuack();
    }

    duck.addEventListener("pointerdown", petDuck);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "Enter") {
        const rect = duck.getBoundingClientRect();
        petDuck({ clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 });
      }
    });
  </script>
</body>
</html>
